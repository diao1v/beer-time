[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = /dev/cu.usbserial-588F0098501
monitor_port = /dev/cu.usbserial-588F0098501

board_build.partitions = partitions_ota.csv

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DGH_OWNER=\"diao1v\"
  -DGH_REPO=\"beer-time\"
  ; FIRMWARE_VERSION defaults to "dev-local" in main.cpp (see #ifndef guard).
  ; CI overrides via PLATFORMIO_BUILD_FLAGS=-DFIRMWARE_VERSION=\"v0.x.y\".

lib_deps =
  https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
  adafruit/Adafruit GFX Library @ ^1.11.10
  adafruit/Adafruit BusIO @ ^1.16.1
  knolleary/PubSubClient @ ^2.8

[env:discovery]
extends = env:esp32dev
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DDISCOVERY_MODE=1
  -DGH_OWNER=\"diao1v\"
  -DGH_REPO=\"beer-time\"
